<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meeting Action Tracker</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      background: #f3f4f6;
    }

    .card {
      border-radius: 18px;
      background: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .not-started {
      background: #fee2e2;
      color: #dc2626;
    }

    .in-progress {
      background: #fef3c7;
      color: #d97706;
    }

    .completed {
      background: #dcfce7;
      color: #16a34a;
    }
  </style>
</head>

<body>

<div class="min-h-screen p-6">

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">

    <div>
      <h1 class="text-3xl font-bold">Meeting Action Tracker</h1>
      <p class="text-gray-500 mt-1">Simple Live Dashboard</p>
    </div>

    <button onclick="downloadExcel()"
      class="bg-blue-600 text-white px-5 py-3 rounded-xl hover:bg-blue-700 transition">
      Export Excel
    </button>

  </div>

  <!-- DASHBOARD -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">

    <div class="card p-5">
      <p class="text-gray-500 text-sm">Total Tasks</p>
      <h2 id="totalTasks" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="card p-5">
      <p class="text-red-500 text-sm">Not Started</p>
      <h2 id="notStartedTasks" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="card p-5">
      <p class="text-yellow-500 text-sm">In Progress</p>
      <h2 id="inProgressTasks" class="text-3xl font-bold mt-2">0</h2>
    </div>

    <div class="card p-5">
      <p class="text-green-500 text-sm">Completed</p>
      <h2 id="completedTasks" class="text-3xl font-bold mt-2">0</h2>
    </div>

  </div>

  <!-- ADD TASK -->
  <div class="card p-6 mb-6">

    <h2 class="text-2xl font-bold mb-6">
      Add New Task
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

      <!-- TITLE -->
      <div>
        <label class="text-sm text-gray-500">Title</label>

        <input
          id="title"
          type="text"
          placeholder="Enter task title"
          class="w-full border rounded-xl p-3 mt-1 outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- OWNER -->
      <div>
        <label class="text-sm text-gray-500">Owner</label>

        <input
          id="owner"
          type="text"
          placeholder="Enter owner name"
          class="w-full border rounded-xl p-3 mt-1 outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- DESCRIPTION -->
      <div class="md:col-span-2">

        <label class="text-sm text-gray-500">
          Description
        </label>

        <textarea
          id="description"
          placeholder="Enter task description"
          class="w-full border rounded-xl p-3 mt-1 min-h-[120px] outline-none focus:ring-2 focus:ring-blue-400"></textarea>

      </div>

      <!-- DUE DATE -->
      <div>

        <label class="text-sm text-gray-500">
          Due Date
        </label>

        <input
          id="dueDate"
          type="date"
          class="w-full border rounded-xl p-3 mt-1 outline-none focus:ring-2 focus:ring-blue-400">

      </div>

      <!-- STATUS -->
      <div>

        <label class="text-sm text-gray-500">
          Status
        </label>

        <select
          id="status"
          onchange="handleStatusChange()"
          class="w-full border rounded-xl p-3 mt-1 outline-none focus:ring-2 focus:ring-blue-400">

          <option>Not Started</option>
          <option>In Progress</option>
          <option>Completed</option>

        </select>

      </div>

      <!-- PROGRESS -->
      <div class="md:col-span-2">

        <div class="flex justify-between mb-2">
          <label class="text-sm text-gray-500">
            Progress
          </label>

          <span id="progressText" class="text-sm font-medium">
            0%
          </span>
        </div>

        <input
          id="progress"
          type="range"
          min="0"
          max="100"
          value="0"
          oninput="updateProgressText()"
          class="w-full">

      </div>

    </div>

    <button
      onclick="addTask()"
      class="mt-6 bg-green-600 text-white px-6 py-3 rounded-xl hover:bg-green-700 transition">

      Save Task

    </button>

  </div>

  <!-- TASK TABLE -->
  <div class="card overflow-auto">

    <table class="w-full">

      <thead class="bg-gray-100">

        <tr class="text-left text-gray-500 text-sm">

          <th class="p-4">Title</th>
          <th class="p-4">Description</th>
          <th class="p-4">Owner</th>
          <th class="p-4">Due Date</th>
          <th class="p-4">Status</th>
          <th class="p-4">Progress</th>
          <th class="p-4">Actions</th>

        </tr>

      </thead>

      <tbody id="taskTable"></tbody>

    </table>

  </div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function updateProgressText() {

  document.getElementById("progressText").innerText =
    document.getElementById("progress").value + "%";
}

function handleStatusChange() {

  const status = document.getElementById("status").value;
  const progress = document.getElementById("progress");

  if (status === "Completed") {
    progress.value = 100;
  }

  if (status === "Not Started") {
    progress.value = 0;
  }

  updateProgressText();
}

function addTask() {

  const title = document.getElementById("title").value.trim();
  const owner = document.getElementById("owner").value.trim();
  const description = document.getElementById("description").value.trim();
  const dueDate = document.getElementById("dueDate").value;
  const status = document.getElementById("status").value;
  const progress = document.getElementById("progress").value;

  if (!title || !owner) {
    alert("Please fill Title and Owner");
    return;
  }

  tasks.push({
    title,
    description,
    owner,
    dueDate,
    status,
    progress
  });

  saveTasks();

  renderTasks();

  clearForm();
}

function clearForm() {

  document.getElementById("title").value = "";
  document.getElementById("description").value = "";
  document.getElementById("owner").value = "";
  document.getElementById("dueDate").value = "";

  document.getElementById("status").value = "Not Started";

  document.getElementById("progress").value = 0;

  updateProgressText();
}

function renderTasks() {

  const table = document.getElementById("taskTable");

  table.innerHTML = "";

  let notStarted = 0;
  let inProgress = 0;
  let completed = 0;

  tasks.forEach((task, index) => {

    if (task.status === "Not Started") {
      notStarted++;
    }

    if (task.status === "In Progress") {
      inProgress++;
    }

    if (task.status === "Completed") {
      completed++;
    }

    let badgeClass = "";

    if (task.status === "Not Started") {
      badgeClass = "not-started";
    }

    if (task.status === "In Progress") {
      badgeClass = "in-progress";
    }

    if (task.status === "Completed") {
      badgeClass = "completed";
    }

    table.innerHTML += `

      <tr class="border-t hover:bg-gray-50">

        <td class="p-4 font-medium">
          ${task.title}
        </td>

        <td class="p-4 text-sm text-gray-600 max-w-[300px]">
          ${task.description}
        </td>

        <td class="p-4">
          ${task.owner}
        </td>

        <td class="p-4">
          ${task.dueDate}
        </td>

        <td class="p-4">

          <span class="status-badge ${badgeClass}">
            ${task.status}
          </span>

        </td>

        <td class="p-4 w-[220px]">

          <div class="w-full bg-gray-200 rounded-full h-3">

            <div
              class="bg-blue-600 h-3 rounded-full"
              style="width:${task.progress}%">
            </div>

          </div>

          <p class="text-xs text-gray-500 mt-1">
            ${task.progress}%
          </p>

        </td>

        <td class="p-4">

          <button
            onclick="deleteTask(${index})"
            class="bg-red-100 text-red-600 px-4 py-2 rounded-lg text-sm hover:bg-red-200 transition">

            Delete

          </button>

        </td>

      </tr>

    `;
  });

  document.getElementById("totalTasks").innerText =
    tasks.length;

  document.getElementById("notStartedTasks").innerText =
    notStarted;

  document.getElementById("inProgressTasks").innerText =
    inProgress;

  document.getElementById("completedTasks").innerText =
    completed;
}

function deleteTask(index) {

  if (!confirm("Delete this task?")) {
    return;
  }

  tasks.splice(index, 1);

  saveTasks();

  renderTasks();
}

function downloadExcel() {

  const worksheet =
    XLSX.utils.json_to_sheet(tasks);

  const workbook =
    XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(
    workbook,
    worksheet,
    "Tasks"
  );

  XLSX.writeFile(
    workbook,
    "Meeting_Action_Tracker.xlsx"
  );
}

renderTasks();

</script>

</body>
</html>
